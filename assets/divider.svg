<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 20" fill="none" role="img" aria-label="">
  <defs>
    <linearGradient id="seg" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2dd4bf" stop-opacity="1"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes glide { 0% { transform: translateX(-220px); } 100% { transform: translateX(1200px); } }
      @keyframes dot   { 0%,100% { opacity: 0.25; } 50% { opacity: 0.95; } }
      .glide { animation: glide 4.8s linear infinite; }
      .d     { animation: dot 3s ease-in-out infinite; }
    </style>
  </defs>
  <line x1="0" y1="10" x2="1200" y2="10" stroke="#8b949e" stroke-width="1" opacity="0.28"/>
  <circle class="d" cx="240" cy="10" r="2.2" fill="#2dd4bf" style="animation-delay:0s"/>
  <circle class="d" cx="600" cy="10" r="2.6" fill="#2dd4bf" style="animation-delay:1s"/>
  <circle class="d" cx="960" cy="10" r="2.2" fill="#2dd4bf" style="animation-delay:2s"/>
  <g class="glide"><rect x="0" y="9" width="200" height="2" rx="1" fill="url(#seg)" filter="url(#g)"/></g>
</svg>
